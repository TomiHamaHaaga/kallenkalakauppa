<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yhteystiedot – Kallen kalakauppa</title>
  <meta name="description" content="Kallen kalakaupan yhteystiedot, puhelinnumero, sähköposti ja sijainti Joensuussa.">

  <!-- Ulkoinen tyyli -->
  <link rel="stylesheet" href="./tyylit.css?v=13">

  <!-- Sivukohtaiset tyylit -->
  <style>
    body.contacts-page .contact-grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin: 16px 0 40px;
    }
    @media (min-width: 768px){
      body.contacts-page .contact-grid{
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
    }

    body.contacts-page .contact-card{
      background:#fff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.07);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    body.contacts-page .row{
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    body.contacts-page .icon{
      width: 28px; height: 28px;
      display: inline-block;
    }
    body.contacts-page .icon path,
    body.contacts-page .icon rect,
    body.contacts-page .icon circle{
      stroke: var(--text);
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    body.contacts-page .contact-card a{
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      word-break: break-word;
    }
    body.contacts-page .contact-card a:hover{
      color: var(--accent);
    }

    body.contacts-page .map-desc{
      margin: 0; color: var(--text);
    }

    body.contacts-page .contact-card h2{
      margin: 0 0 6px 0;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 800;
      color: var(--text);
      text-align: left;
    }

    .map-embed iframe{
      width: 100%;
      height: 260px;
      border: 0;
      border-radius: 10px;
    }
  </style>
</head>

<body class="contacts-page">

  <!-- ===== HEADER ===== -->
  <header class="site-header container">
    <a href="index.html" class="brand" aria-label="Etusivu">
      <img src="KallenkalakauppaLogo.png" alt="Kallen kalakauppa logo">
    </a>

    <button class="burger" aria-label="Avaa valikko" aria-controls="paanav" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
           viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6H21M3 12H21M3 18H21"
              stroke="#0C3806" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>

    <nav id="paanav" class="nav" aria-label="Päänavigaatio">
      <ul>
        <li><a hrefhteystiedot</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== LINKKIBOXIT ===== -->
  <section class="links container" aria-label="Pikalinkit">
    <a class="box" href="info.html">Meistä</a>
    <a class="box" href="kauppa.html">Kauppa</a>
    <a class="box" href="yhteystiedot.html" aria-current="page">Yhteystiedot</a>
  </section>

  <!-- ===== SISÄLTÖ ===== -->
  <main class="content container">
    <h1 class="center">Yhteystiedot</h1>

    <section class="contact-grid" aria-label="Yhteystietokortit">

      <!-- Kortti 1 -->
      <article class="contact-card" aria-labelledby="yt-otsikko">
        <h2 id="yt-otsikko">Ota yhteyttä</h2>

        <!-- Puhelin -->
        <div class="row">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 16.9v2.2a2 2 0 0 1-2.2 2c-9.6-.7-17.2-8.3-17.9-17.9A2 2 0 0 1 3.9 1h2.2a2 2 0 0 1 2 1.7l.4 2.8a2 2 0 0 1-.6 1.7l-1.3 1.3a16 16 0 0 0 8.4 8.4l1.3-1.3a2 2 0 0 1 1.7-.6l2.8.4a2 2 0 0 1 1.7 2z"/>
          </svg>
          <a href="tel:040000000">040 0xxx xxx</a>
        </div>

        <!-- Sähköposti -->
        <div class="row">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="14" rx="2.2" ry="2.2"/>
            <path d="M4 7.5l8 6 8-6"/>
          </svg>
          <a href="mailto:kallenkalakauppa@elisanet.fi">
            kallenkalakauppa@elisanet.fi
          </a>
        </div>
      </article>

      <!-- Kortti 2 -->
      <article class="contact-card" aria-labelledby="map-otsikko">
        <h2 id="map-otsikko">Sijainti</h2>
        <p class="map-desc"><b>Toimimme Joensuun alueella. Katso sijainti kartalta:</b></p>

        <div class="map-embed">
          <iframe
            title="Joensuun tori – Google Maps"
            src="https://www.google.com/maps?q=Joensuun+Tori&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen>
          </iframe>
        </div>
      </article>

    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <nav class="social-icons container" aria-label="Sosiaalisen median linkit">
      <a class="social-link" href="https://x.com" target="_blank" rel="noopener">
        <img src="x.svg" alt="X-logo">
      </a>
      <a class="social-link" href="https://threads.net" target="_blank" rel="noopener">
        <img src="threads.svg" alt="Threads-logo">
      </a>
      <a class="social-link" href="https://instagram.com" target="_blank" rel="noopener">
        <img src="instagram.svg" alt="Instagram-logo">
      </a>
      <a class="social-link" href="https://facebook.com" target="_blank" rel="noopener">
        <img src="facebook.svg" alt="Facebook-logo">
      </a>
    </nav>
  </footer>

  <!-- ===== JS ===== -->
  <script>
    (function () {
      const burger = document.querySelector('.burger');
      const nav = document.getElementById('paanav');
      if (!burger || !nav) return;

      function toggleNav(force){
        const open = (typeof force === 'boolean') ? force : !nav.classList.contains('open');
        nav.classList.toggle('open', open);
        burger.setAttribute('aria-expanded', open);
      }

      burger.addEventListener('click', () => toggleNav());

      window.addEventListener('keydown', e => {
        if (e.key === 'Escape') toggleNav(false);
      });

      document.addEventListener('click', e => {
        if (!nav.contains(e.target) && !burger.contains(e.target)){
          toggleNav(false);
        }
      });

      const mql = window.matchMedia('(min-width: 768px)');
      const onChange = e => {
        if (e.matches){
          nav.classList.remove('open');
          burger.setAttribute('aria-expanded', 'false');
        }
      };

      if (mql.addEventListener) mql.addEventListener('change', onChange);
      else mql.addListener(onChange);
    })();
  </script>

</body>
</html>
