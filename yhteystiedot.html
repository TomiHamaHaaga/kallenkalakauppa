  <!-- Ulkoinen tyyli + cache-buster -->
  <link rel="stylesheet" href="./tyylit.css?v=13">

  <!-- Sivukohtaiset tyylit (scoped) -->
  <style>
    /* YHTEYSTIEDOT.SIVU – vain tälle sivulle */
    body.contacts-page .contact-grid{
      display: grid;
      grid-template-columns: 1fr;               /* mobiili */
      gap: 20px;
      margin: 16px 0 40px;
    }
    @media (min-width: 768px){
      body.contacts-page .contact-grid{
        grid-template-columns: 1fr 1fr;         /* tabletti & desktop */
        align-items: stretch;
      }
    }

    body.contacts-page .contact-card{
      background:#fff;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.07);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Rivi (ikoni + teksti/linkki) */
    body.contacts-page .row{
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    /* Yhteystieto‑ikonit (inline‑SVG) */
    body.contacts-page .icon{
      width: 28px; height: 28px; display: inline-block;
    }
    body.contacts-page .icon path,
    body.contacts-page .icon circle{
      stroke: var(--text);
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* Linkit ja tekstit */
    body.contacts-page .contact-card a{
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      word-break: break-word;
    }
    body.contacts-page .contact-card a:hover{ color: var(--accent); }

    /* Karttakortti – linkkinappi */
    body.contacts-page .map-link{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--text);
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      width: max-content;
      transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease;
    }
    body.contacts-page .map-link:hover{
      background: var(--accent);
      box-shadow: 0 8px 20px rgba(0,0,0,.14);
      transform: translateY(-1px);
    }
    body.contacts-page .map-desc{
      margin: 0; color: var(--text);
    }

    /* Pieni otsikkotyyli korteille */
    body.contacts-page .contact-card h2{
      margin: 0 0 6px 0;
      font-size: clamp(18px, 2.2vw, 22px);
      font-weight: 800;
      color: var(--text);
      text-align: left;
    }
  </style>
</head>

  <!-- ===== JS: burger avaa/sulkee valikon MOBIILISSA ===== -->
  <script>
    (function () {
      const burger = document.querySelector('.burger');
      const nav    = document.getElementById('paanav');
      if (!burger || !nav) return;

      function toggleNav(force) {
        const open = (typeof force === 'boolean') ? force : !nav.classList.contains('open');
        nav.classList.toggle('open', open);
        burger.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      burger.addEventListener('click', () => toggleNav());

      // Sulje ESC:llä
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') toggleNav(false); });

      // Sulje klikkaamalla ulkopuolelle
      document.addEventListener('click', (e) => {
        if (!nav.contains(e.target) && !burger.contains(e.target)) toggleNav(false);
      });

      // Kun siirrytään tablet/desktopiin, resetoi tila
      const mql = window.matchMedia('(min-width: 768px)');
      function onChange(e){
        if (e.matches) { nav.classList.remove('open'); burger.setAttribute('aria-expanded', 'false'); }
      }
      if (mql.addEventListener) mql.addEventListener('change', onChange);
      else mql.addListener(onChange);
    })();
  </script>
