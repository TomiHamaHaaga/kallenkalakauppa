<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tervetuloa Kallen kalakauppaan!</title>
  <meta name="Kallen kalakauppa" content="Kallen kalakaupan verkkosivut" />

  <!-- Ulkoinen tyyli + cache-buster -->
  <link rel="stylesheet" href="./tyylit.css?v=13" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header container">
    <!-- Logo keskitettynä -->
    <a href="index.html" class="brand" aria-label="Etusivu">
      <img src="KallenkalakauppaLogo.png" alt="Kallen kalakauppa" />
      
    </a>

    <!-- Burger (näkyy vain mobiilissa) -->
    <button class="burger" aria-label="Avaa valikko" aria-controls="paanav" aria-expanded="false">
      <!-- Inline-SVG: ei rikkoudu poluista -->
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
           viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 6H21M3 12H21M3 18H21"
              stroke="#0C3806" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      </svg>
    </button>

    <!-- Päänavigaatio: MOBIILISSA piilossa, aukeaa burgerista.
         TABLET/DESKTOP: PIILOSSA kokonaan (laatikot toimivat navi­gaationa) -->
    <nav id="paanav" class="nav" aria-label="Päänavigaatio">
      <ul>
        <li><a href="info.html">Meistä</a></li>
        <li><a href="kauppa.html">Kauppa</a></li>
        <li><a href="yhteystiedot.html">Yhteystiedot</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== LINKKIBOXIT (AINOA sisäinen navigaatio tablet/desktopissa) ===== -->
  <section class="links container" aria-label="Pikalinkit">
    <a class="box" href="info.html">Meistä</a>
    <a class="box" href="kauppa.html">Kauppa</a>
    <a class="box" href="yhteystiedot.html">Yhteystiedot</a>
  </section>

  <!-- ===== SISÄLTÖ ===== -->
  <main class="content container">
    <h1>Tervetuloa Kallen kalaupan sivustolle. </h1>
    <h2>Myymme läheltä pyydettyä kalaa Pohjois-Karjalassa.</h2>
    
  </main>

  <!-- ===== FOOTER (some-ikonit, skaalautuvat ja keskitetyt) ===== -->
  <footer class="site-footer" role="contentinfo"></footer>
    <nav class="social-icons container" aria-label="Sosiaalisen median linkit">
      <a class="social-link" href="https://x.com" target="_blank" rel="noopener" aria-label="X">
        <img src="x.svg" alt="X" />
      </a>
      <a class="social-link" href="https://threads.net" target="_blank" rel="noopener" aria-label="Threads">
        <img src="threads.svg" alt="Threads" />
      </a>
      <a class="social-link" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="instagram.svg" alt="Instagram" />
      </a>
      <a class="social-link" href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
        <img src="facebook.svg" alt="Facebook" />
      </a>
    </nav>
  </footer>

  <!-- ===== JS: burger avaa/sulkee valikon MOBIILISSA ===== -->
  <script>
    (function () {
      const burger = document.querySelector('.burger');
      const nav    = document.getElementById('paanav');
      if (!burger || !nav) return;

      function toggleNav(force) {
        const open = (typeof force === 'boolean') ? force : !nav.classList.contains('open');
        nav.classList.toggle('open', open);
        burger.setAttribute('aria-expanded', open ? 'true' : 'false');
      }

      burger.addEventListener('click', () => toggleNav());

      // Sulje ESC:llä
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') toggleNav(false); });

      // Sulje klikkaamalla ulkopuolelle
      document.addEventListener('click', (e) => {
        if (!nav.contains(e.target) && !burger.contains(e.target)) toggleNav(false);
      });

      // Kun siirrytään tablet/desktopiin, resetoi tila (nav piilossa isolla ruudulla)
      const mql = window.matchMedia('(min-width: 768px)');
      function onChange(e){
        if (e.matches) { nav.classList.remove('open'); burger.setAttribute('aria-expanded', 'false'); }
      }
      if (mql.addEventListener) mql.addEventListener('change', onChange);
      else mql.addListener(onChange);
    })();
  </script>

</body>
</html>
